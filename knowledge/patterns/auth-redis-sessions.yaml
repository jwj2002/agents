schema_version: 1
id: pat-auth-redis-sessions
legacy_id: PAT-002
category: auth
name: Redis session cache
status: validated
tier: primary
description: Server-side session management using Redis for fast session lookup and
  automatic expiry
when_to_use: Server-rendered apps, need server-side session state, require immediate
  session invalidation
when_not_to_use: Stateless API-first services, microservices where JWT is more appropriate,
  environments without Redis
implementation:
  language: python
  framework: FastAPI
  key_files:
  - auth/session_manager.py — session creation, retrieval, and destruction
  - auth/session_middleware.py — request session injection
  - auth/redis_client.py — Redis connection pool management
  key_decisions:
  - 'Session TTL: 30 minutes with sliding expiry'
  - Session ID stored in httpOnly secure cookie
  - Redis key prefix per environment to avoid collisions
  - Session data serialized as JSON for safety (avoid unsafe deserialization)
dependencies:
- aioredis
- redis
tests:
- test_session_creation — verify session stored in Redis with correct TTL
- test_session_retrieval — verify session data returned for valid session ID
- test_session_expiry — verify expired sessions are rejected
- test_session_invalidation — verify logout destroys session in Redis
- test_sliding_expiry — verify TTL resets on each request
