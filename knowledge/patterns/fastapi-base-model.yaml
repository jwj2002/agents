id: pat-fastapi-base-model
legacy_id: PAT-008
category: database
name: SQLAlchemy base model with UUID and timestamps
status: pilot
tier: primary
description: Base model class with UUID primary keys, timezone-aware timestamps, and
  dialect-agnostic UUID type
when_to_use: Any SQLAlchemy model in a FastAPI project
when_not_to_use: Projects using integer auto-increment PKs
implementation:
  language: python
  framework: FastAPI
  key_files:
  - database.py — Base, TimestampMixin, uuid_pk helper
  key_decisions:
  - UUID primary keys for all models — safe for distributed systems
  - 'Dialect-agnostic UUID: GUID TypeDecorator stores as CHAR(32) hex on non-PostgreSQL,
    native UUID on PostgreSQL'
  - TimestampMixin is OWNED by this pattern (pat-fastapi-base-model) — pat-fastapi-database-layer imports it but does
    not define it
  - No soft-delete at base level — add SoftDeleteMixin only where needed
  - Use Mapped[T] and mapped_column() (SQLAlchemy 2.0 syntax)
  - Use TYPE_CHECKING for forward references to avoid circular imports
  reference_code:
    guid_type: "import uuid\nfrom sqlalchemy import CHAR, TypeDecorator\nfrom sqlalchemy.dialects.postgresql\
      \ import UUID as PG_UUID\n\nclass GUID(TypeDecorator):\n    \"\"\"Dialect-agnostic\
      \ UUID type.\n    Uses PostgreSQL's native UUID when available, otherwise CHAR(32)\
      \ with hex encoding.\"\"\"\n    impl = CHAR(32)\n    cache_ok = True\n\n   \
      \ def load_dialect_impl(self, dialect):\n        if dialect.name == \"postgresql\"\
      :\n            return dialect.type_descriptor(PG_UUID(as_uuid=True))\n     \
      \   return dialect.type_descriptor(CHAR(32))\n\n    def process_bind_param(self,\
      \ value, dialect):\n        if value is None:\n            return value\n  \
      \      if dialect.name == \"postgresql\":\n            return value if isinstance(value,\
      \ uuid.UUID) else uuid.UUID(value)\n        return value.hex if isinstance(value,\
      \ uuid.UUID) else uuid.UUID(value).hex\n\n    def process_result_value(self,\
      \ value, dialect):\n        if value is None:\n            return value\n  \
      \      if isinstance(value, uuid.UUID):\n            return value\n        return\
      \ uuid.UUID(value)\n"
    uuid_pk_helper: "from sqlalchemy.orm import Mapped, mapped_column\n\ndef uuid_pk()\
      \ -> Mapped[uuid.UUID]:\n    \"\"\"Standard UUID primary key column.\"\"\"\n\
      \    return mapped_column(GUID(), primary_key=True, default=uuid.uuid4)\n"
    timestamp_mixin: "import datetime as dt\nfrom sqlalchemy import DateTime, func\n\
      from sqlalchemy.orm import Mapped, mapped_column\n\nclass TimestampMixin:\n\
      \    created_at: Mapped[dt.datetime] = mapped_column(\n        DateTime(timezone=True),\
      \ server_default=func.now(), nullable=False,\n    )\n    updated_at: Mapped[dt.datetime]\
      \ = mapped_column(\n        DateTime(timezone=True), server_default=func.now(),\
      \ onupdate=func.now(), nullable=False,\n    )\n"
    example_model: "import uuid\nfrom backend.database import Base, TimestampMixin,\
      \ GUID, uuid_pk\nfrom sqlalchemy.orm import Mapped, mapped_column\nfrom sqlalchemy\
      \ import String, Text, Boolean\n\nclass Bookmark(TimestampMixin, Base):\n  \
      \  __tablename__ = \"bookmarks\"\n\n    id: Mapped[uuid.UUID] = uuid_pk()\n\
      \    title: Mapped[str] = mapped_column(String(255), nullable=False)\n    url:\
      \ Mapped[str] = mapped_column(String(2048), nullable=False)\n    description:\
      \ Mapped[str | None] = mapped_column(Text, nullable=True)\n    is_favorite:\
      \ Mapped[bool] = mapped_column(Boolean, default=False)\n"
  dialect_config:
    note: The GUID TypeDecorator is the dialect abstraction layer for this pattern.
      Models use GUID() everywhere — it resolves to the correct storage at runtime.
    sqlite:
      uuid_storage: CHAR(32) hex-encoded string
      timestamp_onupdate: Handled by SQLAlchemy Python-side (not database trigger)
    postgresql:
      uuid_storage: Native UUID column type
      timestamp_onupdate: Handled by SQLAlchemy Python-side (onupdate=func.now())
  gotchas:
  - Never use `from sqlalchemy.dialects.postgresql import UUID` directly in models
    — use the GUID TypeDecorator instead
  - The GUID type imports PG_UUID internally but only activates it when dialect.name
    == "postgresql"
  - Models are 100% dialect-agnostic — they use GUID() and uuid_pk(), never raw dialect
    types
  - Use back_populates consistently, never backref
  - Document lazy loading strategy per relationship — don't mix selectin and select
    without reason
  - SQLite does not support server_default=func.now() on UPDATE — onupdate=func.now()
    is handled by SQLAlchemy (Python-side), not the database
dependencies:
- SQLAlchemy
tests:
- test_uuid_pk_generated
- test_created_at_auto_set
- test_updated_at_changes_on_update
