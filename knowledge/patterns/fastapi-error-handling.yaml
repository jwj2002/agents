id: PAT-013
category: error-handling
name: FastAPI structured error handling with domain exceptions
status: pilot
tier: primary
description: Exception hierarchy with structured JSON responses, global handlers,
  and consistent error shape
when_to_use: Any FastAPI project
when_not_to_use: None — always use this
implementation:
  language: python
  framework: FastAPI
  key_files:
  - core/exceptions.py — AppError hierarchy
  - core/error_handlers.py — global handlers
  - main.py — registration
  key_decisions:
  - AppError base with message + context dict
  - '6 subclasses: EntityNotFound(404), ConflictError(409), BusinessValidationError(422),
    PermissionDenied(403), AuthenticationError(401), ExternalServiceError(502)'
  - 'Every handler returns same shape: {error: {code, message, context}}'
  - Include RequestValidationError handler for consistent Pydantic error format
  - Catch-all handler for unexpected exceptions (500) with logging
  - Module-specific exceptions MUST inherit from AppError
  gotchas:
  - Never create exceptions that don't inherit AppError — they'll bypass handlers
    and return raw 500s
  - Always add logging in the 500 catch-all handler
  - BusinessValidationError (422) conflicts with FastAPI's default 422 — handle RequestValidationError
    separately
  reference_code:
    exceptions_py: "\"\"\"Structured domain exceptions.\n\nAppError base with 6 subclasses.\
      \ Every exception carries a machine-readable\ncode, human message, and optional\
      \ context dict. Global handlers map these\nto a consistent JSON shape.\n\"\"\
      \"\n\nfrom typing import Any\n\n\nclass AppError(Exception):\n    \"\"\"Base\
      \ for all domain exceptions.\n\n    Subclasses set ``status_code`` and ``code``.\
      \  Handlers read these\n    attributes to build the HTTP response.\n    \"\"\
      \"\n\n    status_code: int = 500\n    code: str = \"INTERNAL_ERROR\"\n\n   \
      \ def __init__(self, message: str, context: dict[str, Any] | None = None) ->\
      \ None:\n        super().__init__(message)\n        self.message = message\n\
      \        self.context = context or {}\n\n\nclass EntityNotFound(AppError):\n\
      \    status_code = 404\n    code = \"NOT_FOUND\"\n\n\nclass ConflictError(AppError):\n\
      \    status_code = 409\n    code = \"CONFLICT\"\n\n\nclass BusinessValidationError(AppError):\n\
      \    status_code = 422\n    code = \"VALIDATION_ERROR\"\n\n\nclass PermissionDenied(AppError):\n\
      \    status_code = 403\n    code = \"PERMISSION_DENIED\"\n\n\nclass AuthenticationError(AppError):\n\
      \    status_code = 401\n    code = \"AUTHENTICATION_ERROR\"\n\n\nclass ExternalServiceError(AppError):\n\
      \    status_code = 502\n    code = \"EXTERNAL_SERVICE_ERROR\"\n"
    error_handlers_py: "\"\"\"Global error handlers.\n\nEvery handler returns the\
      \ same shape:\n    {\"error\": {\"code\": str, \"message\": str, \"context\"\
      : dict}}\n\nRegistered on the FastAPI app in main.py via register_error_handlers().\n\
      \"\"\"\n\nimport logging\nfrom typing import Any\n\nfrom fastapi import FastAPI,\
      \ Request\nfrom fastapi.exceptions import RequestValidationError\nfrom fastapi.responses\
      \ import JSONResponse\n\nfrom backend.core.exceptions import AppError\n\nlogger\
      \ = logging.getLogger(__name__)\n\n\ndef _error_body(code: str, message: str,\
      \ context: dict[str, Any] | None = None) -> dict:\n    return {\"error\": {\"\
      code\": code, \"message\": message, \"context\": context or {}}}\n\n\nasync\
      \ def app_error_handler(_request: Request, exc: AppError) -> JSONResponse:\n\
      \    return JSONResponse(\n        status_code=exc.status_code,\n        content=_error_body(exc.code,\
      \ exc.message, exc.context),\n    )\n\n\nasync def validation_error_handler(\n\
      \    _request: Request, exc: RequestValidationError\n) -> JSONResponse:\n  \
      \  return JSONResponse(\n        status_code=422,\n        content=_error_body(\n\
      \            \"REQUEST_VALIDATION_ERROR\",\n            \"Request validation\
      \ failed\",\n            {\"details\": exc.errors()},\n        ),\n    )\n\n\
      \nasync def catch_all_handler(_request: Request, exc: Exception) -> JSONResponse:\n\
      \    logger.exception(\"Unhandled exception: %s\", exc)\n    return JSONResponse(\n\
      \        status_code=500,\n        content=_error_body(\"INTERNAL_ERROR\", \"\
      An unexpected error occurred\"),\n    )\n\n\ndef register_error_handlers(app:\
      \ FastAPI) -> None:\n    \"\"\"Call once from main.py to wire all handlers.\"\
      \"\"\n    app.add_exception_handler(AppError, app_error_handler)\n    app.add_exception_handler(RequestValidationError,\
      \ validation_error_handler)\n    app.add_exception_handler(Exception, catch_all_handler)\n"
dependencies:
- FastAPI
tests:
- test_entity_not_found_returns_404
- test_error_shape_consistent
- test_request_validation_error_handled
- test_unexpected_error_returns_500
