schema_version: 1
id: pat-fastapi-database-layer
legacy_id: PAT-007
category: database
name: FastAPI database layer with SQLAlchemy
status: pilot
tier: primary
description: Synchronous SQLAlchemy setup with session-per-request, connection pooling,
  and TimestampMixin
when_to_use: Any FastAPI project with a relational database
when_not_to_use: Serverless functions, projects needing async (use asyncpg pattern
  instead)
implementation:
  language: python
  framework: FastAPI
  key_files:
  - database.py — engine, SessionLocal, get_db, Base, TimestampMixin
  - core/config.py — database URL from pydantic-settings
  key_decisions:
  - Sync SQLAlchemy (not async) — simpler, sufficient for most apps
  - pool_pre_ping=True for stale connection detection
  - get_db() yields session with explicit rollback on exception in finally block
  - TimestampMixin defined in pat-fastapi-base-model — this pattern imports it, does not define it
  - No Active Record pattern (no CRUDMixin on Base) — repositories handle all DB ops
  - 'Dialect-agnostic core: engine creation and get_db() are identical across databases.
    Only connection string and pool settings change.'
  reference_code:
    database_py: "from sqlalchemy import create_engine\nfrom sqlalchemy.orm import\
      \ DeclarativeBase, sessionmaker, Session\nfrom typing import Generator\nfrom\
      \ backend.core.config import settings\n\nengine = create_engine(settings.DATABASE_URL,\
      \ **settings.engine_kwargs)\nSessionLocal = sessionmaker(autocommit=False, autoflush=False,\
      \ bind=engine)\n\nclass Base(DeclarativeBase):\n    pass\n\ndef get_db() ->\
      \ Generator[Session, None, None]:\n    db = SessionLocal()\n    try:\n     \
      \   yield db\n    except Exception:\n        db.rollback()\n        raise\n\
      \    finally:\n        db.close()\n"
    config_py: "from pydantic_settings import BaseSettings\n\nclass Settings(BaseSettings):\n\
      \    DATABASE_URL: str = \"sqlite:///./app.db\"\n\n    @property\n    def engine_kwargs(self)\
      \ -> dict:\n        \"\"\"Dialect-specific engine configuration.\"\"\"\n   \
      \     base = {\"pool_pre_ping\": True}\n        if self.DATABASE_URL.startswith(\"\
      postgresql\"):\n            base.update(pool_size=5, max_overflow=10, pool_recycle=3600)\n\
      \        return base\n\n    model_config = {\"env_file\": \".env\", \"env_file_encoding\"\
      : \"utf-8\"}\n\nsettings = Settings()\n"
  dialect_config:
    note: Only connection string and pool settings are dialect-specific. All other
      code (Base, get_db, SessionLocal) is identical.
    sqlite:
      url_format: sqlite:///./app.db
      pool_settings: None — SQLite uses StaticPool by default
      driver: built-in (no extra dependency)
      test_url: sqlite://
    postgresql:
      url_format: postgresql+psycopg2://user:pass@host:5432/dbname
      pool_settings: pool_size=5, max_overflow=10, pool_recycle=3600
      driver: psycopg2-binary
      test_url: postgresql+psycopg2://test:test@localhost:5432/test_db
  gotchas:
  - engine_kwargs property in Settings handles dialect branching — database.py stays
    clean
  - Use func.now() not datetime.utcnow() for timestamps — lets the DB be the clock
  - Never import engine at module level in tests — use dependency override
  - Add new dialects by extending the engine_kwargs property, not by changing database.py
dependencies:
- SQLAlchemy
- pydantic-settings
dialect_dependencies:
  postgresql:
  - psycopg2-binary
  mysql:
  - pymysql
  sqlite: []
tests:
- test_get_db_yields_session
- test_get_db_closes_on_exception
- test_timestamp_mixin_sets_created_at
