id: PAT-010
category: repository
name: Generic repository pattern with BaseRepository[T]
status: pilot
tier: primary
description: Type-safe generic repository providing CRUD, pagination with ordering,
  filtered queries, and bulk operations
when_to_use: Any FastAPI project with SQLAlchemy models
when_not_to_use: Projects using raw SQL (use asyncpg pattern), single-table simple
  apps
implementation:
  language: python
  framework: FastAPI
  key_files:
  - core/repository.py — BaseRepository[T]
  - '{module}/repository.py — concrete repos'
  key_decisions:
  - Generic[T] with model class attribute — concrete repos inherit all methods for
    free
  - 'Constructor takes db: Session — injected per-request via FastAPI Depends'
  - Repositories NEVER commit — services control transaction boundaries
  - list_paginated requires explicit order_by (string column name)
  - partial_update with skip_none for PATCH semantics
  - exists() uses SQL EXISTS subquery (efficient, no row fetch)
  - count() with optional filters, skips None values
  - get_with_filter(id, **filters) for tenant-scoped lookups, returns None if not
    found
  - 'Async variant: BaseRepository[ModelT: Base] using Python 3.12 type parameter
    syntax with AsyncSession'
  - 'get_or_raise(id_) — returns entity or raises NotFoundError (eliminates repetitive
    None checks in services)'
  - 'update() catches StaleDataError and raises ConflictError for optimistic concurrency
    safety net'
  - 'get_multi() returns tuple[list[ModelT], int] (items + total_count) for pagination'
  - 'Default ordering: created_at DESC if model has created_at column and no order_by
    specified'
  - 'Async repo uses flush() instead of add/commit — service layer owns transaction'
  reference_code:
    async_base_repository: "import uuid\nfrom typing import Any\n\nfrom sqlalchemy\
      \ import func, select\nfrom sqlalchemy.ext.asyncio import AsyncSession\nfrom\
      \ sqlalchemy.orm import exc as orm_exc\n\nfrom app.core.exceptions import ConflictError,\
      \ NotFoundError\nfrom app.models.base import Base\n\n\nclass BaseRepository[ModelT:\
      \ Base]:\n    \"\"\"Async base repository with CRUD operations.\"\"\"\n\n   \
      \ def __init__(self, session: AsyncSession, model: type[ModelT]) -> None:\n \
      \       self.session = session\n        self.model = model\n\n    async def get(self,\
      \ id_: uuid.UUID) -> ModelT | None:\n        result = await self.session.execute(\n\
      \            select(self.model).where(self.model.id == id_)\n        )\n     \
      \   return result.scalar_one_or_none()\n\n    async def get_or_raise(self, id_:\
      \ uuid.UUID) -> ModelT:\n        obj = await self.get(id_)\n        if obj is\
      \ None:\n            raise NotFoundError(f\"{self.model.__name__} not found\"\
      )\n        return obj\n\n    async def get_multi(\n        self,\n        *,\n\
      \        offset: int = 0,\n        limit: int = 50,\n        order_by: str |\
      \ None = None,\n        descending: bool = False,\n        filters: dict[str,\
      \ Any] | None = None,\n        options: list | None = None,\n    ) -> tuple[list[ModelT],\
      \ int]:\n        stmt = select(self.model)\n        count_stmt = select(func.count()).select_from(self.model)\n\
      \        if options:\n            for opt in options:\n                stmt =\
      \ stmt.options(opt)\n        if filters:\n            for key, value in filters.items():\n\
      \                if value is not None:\n                    col = getattr(self.model,\
      \ key)\n                    stmt = stmt.where(col == value)\n               \
      \     count_stmt = count_stmt.where(col == value)\n        total = (await self.session.execute(count_stmt)).scalar_one()\n\
      \        if order_by and hasattr(self.model, order_by):\n            col = getattr(self.model,\
      \ order_by)\n            stmt = stmt.order_by(col.desc() if descending else col)\n\
      \        elif hasattr(self.model, \"created_at\"):\n            stmt = stmt.order_by(self.model.created_at.desc())\n\
      \        stmt = stmt.offset(offset).limit(limit)\n        result = await self.session.execute(stmt)\n\
      \        if options:\n            return list(result.unique().scalars().all()),\
      \ total\n        return list(result.scalars().all()), total\n\n    async def\
      \ create(self, data: dict[str, Any]) -> ModelT:\n        obj = self.model(**data)\n\
      \        self.session.add(obj)\n        await self.session.flush()\n        await\
      \ self.session.refresh(obj)\n        return obj\n\n    async def update(self,\
      \ obj: ModelT, data: dict[str, Any]) -> ModelT:\n        for key, value in data.items():\n\
      \            setattr(obj, key, value)\n        try:\n            await self.session.flush()\n\
      \        except orm_exc.StaleDataError as exc:\n            raise ConflictError(\n\
      \                \"Conflict: entity was modified by another user\",\n       \
      \     ) from exc\n        await self.session.refresh(obj)\n        return obj\n\
      \n    async def delete(self, obj: ModelT) -> None:\n        await self.session.delete(obj)\n\
      \        await self.session.flush()\n\n    async def exists(self, **filters: Any)\
      \ -> bool:\n        stmt = select(func.count()).select_from(self.model)\n   \
      \     for key, value in filters.items():\n            stmt = stmt.where(getattr(self.model,\
      \ key) == value)\n        result = (await self.session.execute(stmt)).scalar_one()\n\
      \        return result > 0\n\n    async def count(self, **filters: Any) -> int:\n\
      \        stmt = select(func.count()).select_from(self.model)\n        for key,\
      \ value in filters.items():\n            if value is not None:\n            \
      \    stmt = stmt.where(getattr(self.model, key) == value)\n        return (await\
      \ self.session.execute(stmt)).scalar_one()\n"
    base_repository: "from typing import Generic, TypeVar, Sequence\nfrom sqlalchemy\
      \ import select, func, exists as sa_exists, delete as sa_delete\nfrom sqlalchemy.orm\
      \ import Session\nimport uuid\n\nT = TypeVar(\"T\")\n\nclass BaseRepository(Generic[T]):\n\
      \    model: type[T]\n\n    def __init__(self, db: Session) -> None:\n      \
      \  self.db = db\n\n    # --- Read ---\n\n    def get(self, id_: uuid.UUID) ->\
      \ T | None:\n        \"\"\"Fetch a single record by primary key. Returns None\
      \ if not found.\"\"\"\n        return self.db.get(self.model, id_)\n\n    def\
      \ get_with_filter(self, id_: uuid.UUID, **filters) -> T | None:\n        \"\"\
      \"Fetch by PK with additional column filters (e.g., account_id). Returns None\
      \ if not found.\"\"\"\n        stmt = select(self.model).where(self.model.id\
      \ == id_)\n        for col, val in filters.items():\n            stmt = stmt.where(getattr(self.model,\
      \ col) == val)\n        return self.db.execute(stmt).scalar_one_or_none()\n\n\
      \    def list_all(self) -> Sequence[T]:\n        \"\"\"Return all records. Use\
      \ sparingly — prefer list_paginated.\"\"\"\n        return self.db.execute(select(self.model)).scalars().all()\n\
      \n    def list_by(self, **filters) -> Sequence[T]:\n        \"\"\"Return records\
      \ matching all given column filters.\"\"\"\n        stmt = select(self.model)\n\
      \        for col, val in filters.items():\n            stmt = stmt.where(getattr(self.model,\
      \ col) == val)\n        return self.db.execute(stmt).scalars().all()\n\n   \
      \ def list_paginated(self, offset: int = 0, limit: int = 20, order_by: str =\
      \ \"created_at\") -> Sequence[T]:\n        \"\"\"Return paginated records ordered\
      \ by the given column name (ascending).\"\"\"\n        col = getattr(self.model,\
      \ order_by)\n        stmt = select(self.model).order_by(col).offset(offset).limit(limit)\n\
      \        return self.db.execute(stmt).scalars().all()\n\n    def exists(self,\
      \ **filters) -> bool:\n        \"\"\"Check if any record matches the filters\
      \ using SQL EXISTS.\"\"\"\n        stmt = select(self.model)\n        for col,\
      \ val in filters.items():\n            stmt = stmt.where(getattr(self.model,\
      \ col) == val)\n        return self.db.execute(select(sa_exists(stmt))).scalar()\n\
      \n    def count(self, **filters) -> int:\n        \"\"\"Count records matching\
      \ filters. Skips None values.\"\"\"\n        stmt = select(func.count()).select_from(self.model)\n\
      \        for col, val in filters.items():\n            if val is not None:\n\
      \                stmt = stmt.where(getattr(self.model, col) == val)\n      \
      \  return self.db.execute(stmt).scalar()\n\n    # --- Write (none of these call\
      \ commit) ---\n\n    def add(self, obj: T) -> T:\n        \"\"\"Add object to\
      \ session. Does NOT commit.\"\"\"\n        self.db.add(obj)\n        return\
      \ obj\n\n    def add_all(self, objs: list[T]) -> list[T]:\n        \"\"\"Add\
      \ multiple objects to session. Does NOT commit.\"\"\"\n        self.db.add_all(objs)\n\
      \        return objs\n\n    def delete(self, obj: T) -> None:\n        \"\"\"\
      Mark object for deletion. Does NOT commit.\"\"\"\n        self.db.delete(obj)\n\
      \n    def bulk_delete(self, **filters) -> int:\n        \"\"\"Delete all records\
      \ matching filters in a single statement. Returns count deleted. Does NOT commit.\"\
      \"\"\n        stmt = sa_delete(self.model)\n        for col, val in filters.items():\n\
      \            stmt = stmt.where(getattr(self.model, col) == val)\n        result\
      \ = self.db.execute(stmt)\n        return result.rowcount\n\n    def partial_update(self,\
      \ obj: T, skip_none: bool = True, **fields) -> T:\n        \"\"\"Update only\
      \ the provided fields on an existing object. Does NOT commit.\n        If skip_none=True\
      \ (default), fields with None values are ignored.\n        If skip_none=False,\
      \ None values are written (sets column to NULL).\"\"\"\n        for key, value\
      \ in fields.items():\n            if skip_none and value is None:\n        \
      \        continue\n            setattr(obj, key, value)\n        return obj\n\
      \n    # --- Session helpers (exposed for services, but repos don't call these\
      \ internally) ---\n\n    def flush(self) -> None:\n        self.db.flush()\n\
      \n    def refresh(self, obj: T) -> None:\n        self.db.refresh(obj)\n\n \
      \   def commit(self) -> None:\n        self.db.commit()\n"
    concrete_example: "from backend.core.repository import BaseRepository\nfrom backend.bookmarks.models\
      \ import Bookmark\n\nclass BookmarkRepository(BaseRepository[Bookmark]):\n \
      \   model = Bookmark\n\n    # Zero custom code needed for basic CRUD — all inherited\
      \ from BaseRepository.\n    # Add custom methods only for domain-specific queries:\n\
      \    #\n    # def list_favorites(self, account_id: uuid.UUID) -> Sequence[Bookmark]:\n\
      \    #     return self.list_by(account_id=account_id, is_favorite=True)\n"
  gotchas:
  - Always pass order_by to list_paginated — without it, results are nondeterministic
  - Never call self.commit() inside a repository method — that's the service's job
  - commit() and flush() are exposed on the repo for services to call via repo.commit(),
    but repos themselves never call them
  - partial_update does not need db.add() — the object is already tracked if fetched
    from the same session
  - bulk_delete uses a single DELETE WHERE statement, not iterating delete() — much
    faster for large deletes
  - order_by parameter is a string column name (e.g., "created_at"), not an SQLAlchemy
    column object
  - 'Async variant: use flush() + refresh() instead of add() — session.add + flush
    + refresh is the async equivalent of sync add + commit'
  - 'StaleDataError from SQLAlchemy is caught in update() and converted to ConflictError
    — this is a safety net for optimistic concurrency'
  - 'When using joinedload with get_multi, call .unique() on results to avoid duplicate
    rows'
  - 'Use joinedload() for 1:1 relationships, selectinload() for 1:many in concrete
    repos'
dependencies:
- SQLAlchemy
tests:
- test_get_by_id
- test_list_paginated_with_ordering
- test_partial_update_skip_none
- test_exists_returns_bool
- test_count_with_filters
