id: pat-fastapi-router-layer
legacy_id: PAT-012
category: router
name: FastAPI thin router pattern
status: pilot
tier: primary
description: Thin routers that parse requests, delegate to services, and return responses
  with proper HTTP semantics
when_to_use: Any FastAPI REST API
when_not_to_use: GraphQL APIs, WebSocket-only endpoints
implementation:
  language: python
  framework: FastAPI
  key_files:
  - '{module}/router.py'
  - main_router.py — registration
  key_decisions:
  - '5 standard endpoints per resource: GET list, GET single, POST create, PATCH update,
    DELETE'
  - POST returns 201, DELETE returns 204, PATCH returns 200
  - PATCH not PUT — partial updates only, no full replacement
  - Routers are thin — parse input, call service, return response. No business logic.
  - Use service.get_or_raise() — never check None in the router
  - Wire PaginationParams to list endpoints via Depends
  - response_model on every endpoint
  gotchas:
  - Never raise HTTPException for business errors — let domain exceptions bubble to
    global handlers
  - 'Always pass tags as a list: tags=[''items''] not tags=''items'''
  - Keep router methods under 15 lines — if longer, logic belongs in the service
  reference_code:
    example_router: "\"\"\"Example thin router (bookmarks shown as reference).\n\n\
      5 CRUD endpoints. No business logic — parse input, call service, return response.\n\
      Domain exceptions bubble to global handlers.\n\"\"\"\n\nimport uuid\n\nfrom\
      \ fastapi import APIRouter, Depends, status\n\nfrom backend.bookmarks.deps import\
      \ get_bookmark_service\nfrom backend.bookmarks.schemas import BookmarkCreate,\
      \ BookmarkRead, BookmarkUpdate\nfrom backend.bookmarks.services import BookmarkService\n\
      from backend.core.schemas import PaginatedResponse, PaginationParams\n\nrouter\
      \ = APIRouter(prefix=\"/bookmarks\", tags=[\"bookmarks\"])\n\n\n@router.get(\"\
      \", response_model=PaginatedResponse[BookmarkRead])\ndef list_bookmarks(\n \
      \   pagination: PaginationParams = Depends(),\n    service: BookmarkService\
      \ = Depends(get_bookmark_service),\n):\n    items, total = service.list_paginated(\n\
      \        offset=pagination.offset, limit=pagination.limit\n    )\n    return\
      \ PaginatedResponse(\n        items=items, total=total, offset=pagination.offset,\
      \ limit=pagination.limit\n    )\n\n\n@router.get(\"/{bookmark_id}\", response_model=BookmarkRead)\n\
      def get_bookmark(\n    bookmark_id: uuid.UUID,\n    service: BookmarkService\
      \ = Depends(get_bookmark_service),\n):\n    return service.get_or_raise(bookmark_id)\n\
      \n\n@router.post(\"\", response_model=BookmarkRead, status_code=status.HTTP_201_CREATED)\n\
      def create_bookmark(\n    data: BookmarkCreate,\n    service: BookmarkService\
      \ = Depends(get_bookmark_service),\n):\n    return service.create(data)\n\n\n\
      @router.patch(\"/{bookmark_id}\", response_model=BookmarkRead)\ndef update_bookmark(\n\
      \    bookmark_id: uuid.UUID,\n    data: BookmarkUpdate,\n    service: BookmarkService\
      \ = Depends(get_bookmark_service),\n):\n    return service.update(bookmark_id,\
      \ data)\n\n\n@router.delete(\"/{bookmark_id}\", status_code=status.HTTP_204_NO_CONTENT)\n\
      def delete_bookmark(\n    bookmark_id: uuid.UUID,\n    service: BookmarkService\
      \ = Depends(get_bookmark_service),\n):\n    service.delete(bookmark_id)\n"
    main_py: '"""FastAPI application entry point.


      Registers error handlers (pat-fastapi-error-handling) and includes routers (pat-fastapi-router-layer).

      """


      from fastapi import FastAPI


      from backend.core.error_handlers import register_error_handlers

      from backend.main_router import api_router


      app = FastAPI(title="My App")


      register_error_handlers(app)

      app.include_router(api_router)

      '
dependencies:
- FastAPI
tests:
- test_list_returns_paginated
- test_create_returns_201
- test_delete_returns_204
- test_get_nonexistent_returns_404
