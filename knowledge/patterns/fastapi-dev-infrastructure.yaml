id: PAT-018
category: infrastructure
name: "FastAPI dev infrastructure (CORS, health, Docker)"
status: draft
tier: primary
description: >
  Development infrastructure for a FastAPI backend serving a React frontend.
  Covers CORS middleware, health endpoints, Dockerfile, docker-compose, and
  environment configuration. These files are scaffolded once at project start
  and rarely change — getting them right upfront avoids hours of debugging
  cross-origin errors, broken containers, and missing env vars.
when_to_use: >
  Any new FastAPI project that serves a React (or other SPA) frontend, or any
  project that needs containerized local development with Postgres.
when_not_to_use: >
  Internal-only APIs with no browser clients (CORS not needed). Serverless
  deployments where Docker is replaced by platform-specific packaging.
implementation:
  language: python
  framework: FastAPI
  key_files:
  - 'core/cors.py'
  - 'core/config.py — CORS_ORIGINS setting'
  - 'main.py — health endpoints, CORS middleware registration'
  - 'Dockerfile'
  - 'docker-compose.yml'
  - '.env.example'
  key_decisions:
  - Settings-driven CORS origins — never hardcode production URLs in code
  - Dev uses allow_origin_regex for any localhost port; production uses explicit allow list
  - allow_credentials=True required for httpOnly cookie auth (refresh tokens)
  - Health endpoint has no auth — load balancers and orchestrators need unauthenticated access
  - /health/ready checks DB connectivity; /health (liveness) does not
  - Multi-stage Docker build keeps image small (~150MB vs ~900MB)
  - Non-root USER in Dockerfile (E14 compliance)
  - docker-compose postgres uses healthcheck so backend waits for DB readiness
  gotchas:
  - "CORS: allow_origins=['*'] with allow_credentials=True is REJECTED by browsers — you must list explicit origins"
  - "CORS: forgetting http://127.0.0.1:PORT in addition to localhost:PORT causes intermittent failures on some OS/browser combos"
  - "Docker: COPY requirements.txt before COPY . to leverage layer caching — pip install only reruns when deps change"
  - "Docker: Always pin base image to a minor version (python:3.12-slim not python:3-slim) for reproducible builds"
  - "docker-compose: Use 127.0.0.1:PORT:PORT not just PORT:PORT for postgres to avoid exposing DB on all interfaces"
  - ".env.example: Never put real secrets in this file — it is committed to git"
  - "Health: /health/ready must use a short DB query timeout (2-3s) to avoid blocking the readiness probe"
  reference_code:
    cors_py: |
      """CORS middleware — settings-driven origins with dev regex fallback.

      Production: reads CORS_ORIGINS from env (comma-separated list).
      Development: additionally allows any localhost/127.0.0.1 origin via regex.
      """

      from __future__ import annotations

      from fastapi import FastAPI
      from fastapi.middleware.cors import CORSMiddleware

      from backend.core.config import settings


      def add_cors_middleware(app: FastAPI) -> None:
          origins = settings.CORS_ORIGINS

          allow_origin_regex = None
          if settings.ENVIRONMENT == "dev":
              # Allow any localhost/127.* origin in dev to avoid port mismatches
              # when switching between CRA (:3000) and Vite (:5173).
              allow_origin_regex = r"^https?://(localhost|127\.0\.0\.1)(:\d+)?$"

          app.add_middleware(
              CORSMiddleware,
              allow_origins=origins,
              allow_origin_regex=allow_origin_regex,
              allow_credentials=True,
              allow_methods=["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"],
              allow_headers=["Content-Type", "Authorization"],
          )

    config_cors_fields: |
      # In core/config.py Settings class:

      # CORS
      CORS_ORIGINS: list[str] = Field(
          default=["http://localhost:3000", "http://localhost:5173"]
      )

      # To override in production, set the env var as a JSON array:
      #   CORS_ORIGINS='["https://app.example.com"]'
      #
      # Or use comma-separated with a validator:
      #   CORS_ORIGINS=https://app.example.com,https://admin.example.com

    health_endpoints: |
      """Health endpoints — no auth required.

      /health        — liveness probe (always returns ok)
      /health/ready  — readiness probe (verifies DB connection)
      """

      from fastapi import APIRouter, Depends
      from sqlalchemy import text
      from sqlalchemy.orm import Session

      from backend.database import get_db

      router = APIRouter(prefix="/health", tags=["health"])


      @router.get("")
      def health_check():
          """Liveness probe. Always returns ok if the process is running."""
          return {"status": "ok"}


      @router.get("/ready")
      def readiness_check(db: Session = Depends(get_db)):
          """Readiness probe. Verifies database connectivity."""
          try:
              db.execute(text("SELECT 1"))
              return {"status": "ok", "database": "connected"}
          except Exception:
              return {"status": "degraded", "database": "unreachable"}

    main_py_registration: |
      # In main.py start_application():

      from backend.core.cors import add_cors_middleware

      app = FastAPI(
          title=settings.PROJECT_NAME,
          version=settings.PROJECT_VERSION,
      )

      # CORS must be added BEFORE routes
      add_cors_middleware(app)

      # Register routes (health has no auth)
      from backend.health.router import router as health_router
      from backend.main_router import api_router

      app.include_router(health_router)
      app.include_router(api_router)

    dockerfile: |
      # --- Stage 1: Builder ---
      FROM python:3.12-slim AS builder

      WORKDIR /build

      # Install build dependencies
      RUN apt-get update && \
          apt-get install -y --no-install-recommends gcc libpq-dev && \
          rm -rf /var/lib/apt/lists/*

      # Copy and install Python dependencies first (layer caching)
      COPY requirements.txt .
      RUN pip install --no-cache-dir --prefix=/install -r requirements.txt

      # Copy application code
      COPY . .
      RUN pip install --no-cache-dir --prefix=/install -e .

      # --- Stage 2: Runtime ---
      FROM python:3.12-slim

      WORKDIR /app

      # Install runtime-only system dependencies
      RUN apt-get update && \
          apt-get install -y --no-install-recommends libpq5 && \
          rm -rf /var/lib/apt/lists/*

      # Copy installed Python packages from builder
      COPY --from=builder /install /usr/local

      # Copy application code
      COPY . .

      # Create non-root user (E14: DOCKER_ROOT_USER)
      RUN adduser --disabled-password --gecos "" appuser
      USER appuser

      EXPOSE 8000

      CMD ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]

    docker_compose_yml: |
      services:
        backend:
          build:
            context: ./backend
            dockerfile: Dockerfile
          container_name: app-backend
          restart: unless-stopped
          env_file:
            - ./backend/.env
          ports:
            - "127.0.0.1:8000:8000"
          depends_on:
            db:
              condition: service_healthy
          volumes:
            # Mount source for hot-reload in dev
            - ./backend:/app
          command: >
            uvicorn backend.main:app
            --host 0.0.0.0 --port 8000 --reload

        db:
          image: postgres:16-alpine
          container_name: app-db
          restart: unless-stopped
          environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            POSTGRES_DB: ${POSTGRES_DB:-appdb}
          ports:
            - "127.0.0.1:5432:5432"
          volumes:
            - pg_data:/var/lib/postgresql/data
          healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
            interval: 5s
            timeout: 5s
            retries: 20

      volumes:
        pg_data:

    env_example: |
      # Database
      POSTGRES_USER=postgres
      POSTGRES_PASSWORD=postgres
      POSTGRES_SERVER=localhost
      POSTGRES_PORT=5432
      POSTGRES_DB=myapp

      # Auth
      SECRET_KEY=change-me-generate-with-python-secrets
      ALGORITHM=HS256
      ACCESS_TOKEN_EXPIRE_MINUTES=60
      REFRESH_TOKEN_EXPIRE_DAYS=7

      # CORS (JSON array for production, dev defaults are built-in)
      CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]

      # App
      ENVIRONMENT=dev
      AUTO_CREATE_TABLES=true

dependencies:
- FastAPI
- CORSMiddleware (starlette)
- SQLAlchemy (for health/ready)
- Docker
- PostgreSQL
tests:
- test_health_returns_ok
- test_health_ready_returns_db_status
- test_cors_allows_configured_origin
- test_cors_rejects_unconfigured_origin
- test_cors_allows_credentials
