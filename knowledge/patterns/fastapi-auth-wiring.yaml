schema_version: 1
id: pat-fastapi-auth-wiring
legacy_id: PAT-016
category: auth
name: FastAPI auth wiring with JWT and CORS
status: pilot
tier: primary
description: 'Wires JWT authentication into the FastAPI layered architecture (pat-fastapi-database-layer
  through pat-fastapi-router-layer). This is NOT about JWT itself (that''s pat-auth-jwt) — it''s about how
  auth integrates with the layers: the get_current_user dependency, login/signup router,
  refresh tokens with httpOnly cookie rotation, password hashing, and CORS config
  for React frontends. Follows the repository-service-router pattern with auth as
  a first-class module.

  '
when_to_use: 'Any FastAPI project using the layered architecture that needs user authentication
  with JWT access tokens and refresh token rotation via httpOnly cookies.

  '
when_not_to_use: 'Session-based auth (use pat-auth-redis-sessions redis sessions), API-key-only services,
  or projects not using the layered architecture.

  '
implementation:
  language: python
  framework: FastAPI
  key_files:
  - auth/oauth2.py — OAuth2 scheme, get_current_user dependency, token creation
  - auth/router.py — login, signup, refresh, /users/me endpoints
  - auth/services.py — UserService with authenticate_user, create_user
  - auth/schemas.py — UserCreate, UserRead, LoginResponse, TokenData
  - auth/models.py — User model, RevokedRefreshToken model
  - auth/repository.py — UserRepository extending BaseRepository[User]
  - core/hashing.py — Hasher class wrapping bcrypt
  - core/config.py — Settings additions for auth (SECRET_KEY, token expiry, CORS)
  key_decisions:
  - OAuth2PasswordBearer(tokenUrl='/login') — tokenUrl MUST match the actual login
    route path
  - get_current_user is a Depends() that decodes JWT, fetches user from DB, raises
    401 if invalid — every protected endpoint uses this
  - Access tokens are short-lived (30min default), refresh tokens are long-lived (7
    days default) stored in httpOnly cookies
  - 'Refresh token rotation: on /auth/refresh, old token JTI is revoked (stored in
    DB), new token pair issued'
  - Password hashing uses bcrypt via a Hasher utility class with configurable rounds
    (12 default, lower in tests)
  - UserService.authenticate_user verifies credentials, router builds tokens — separation
    of concerns
  - Login returns access_token in JSON body, sets refresh_token as httpOnly cookie
    — frontend never touches refresh token
  - CORS middleware configured for React dev servers (localhost:3000, localhost:5173)
    with credentials=True
  - Use PyJWT (not python-jose which is unmaintained) for JWT encode/decode
  - require_admin dependency chains on get_current_user and checks system_role — composable
    auth layers
  reference_code:
    oauth2_module: "\"\"\"auth/oauth2.py — OAuth2 scheme, token creation, get_current_user\
      \ dependency.\"\"\"\nfrom __future__ import annotations\n\nimport logging\n\
      import uuid\nfrom datetime import datetime, timedelta, timezone\nfrom typing\
      \ import Optional\n\nimport jwt\nfrom fastapi import Depends, HTTPException,\
      \ status\nfrom fastapi.security import OAuth2PasswordBearer\nfrom sqlalchemy.orm\
      \ import Session\n\nfrom backend.auth.models import User\nfrom backend.auth.repository\
      \ import UserRepository\nfrom backend.core.config import settings\nfrom backend.database\
      \ import get_db\n\nlogger = logging.getLogger(__name__)\n\n# ---------- OAuth2\
      \ scheme ----------\n# tokenUrl MUST match the actual login route path.\noauth2_scheme\
      \ = OAuth2PasswordBearer(tokenUrl=\"/login\")\n\nALGORITHM = \"HS256\"\n\n\n\
      # ---------- Token creation ----------\ndef create_access_token(\n    data:\
      \ dict,\n    expires_delta: Optional[timedelta] = None,\n) -> str:\n    \"\"\
      \"Create a signed JWT access token.\n\n    Args:\n        data: Payload dict.\
      \ Must include 'sub' (user email or id).\n              Optionally include 'system_role'\
      \ for role-based access.\n        expires_delta: Custom expiry. Defaults to\
      \ settings.ACCESS_TOKEN_EXPIRE_MINUTES.\n\n    Returns:\n        Encoded JWT\
      \ string.\n    \"\"\"\n    to_encode = data.copy()\n    expire = datetime.now(timezone.utc)\
      \ + (\n        expires_delta\n        or timedelta(minutes=settings.ACCESS_TOKEN_EXPIRE_MINUTES)\n\
      \    )\n    to_encode[\"exp\"] = expire\n    return jwt.encode(to_encode, settings.SECRET_KEY,\
      \ algorithm=ALGORITHM)\n\n\ndef create_refresh_token(\n    data: dict,\n   \
      \ expires_days: Optional[int] = None,\n) -> str:\n    \"\"\"Create a signed\
      \ JWT refresh token with a unique JTI for revocation.\n\n    Args:\n       \
      \ data: Payload dict. Must include 'sub' (user email).\n        expires_days:\
      \ Custom expiry in days. Defaults to settings.REFRESH_TOKEN_EXPIRE_DAYS.\n\n\
      \    Returns:\n        Encoded JWT string with type='refresh' and jti claims.\n\
      \    \"\"\"\n    to_encode = data.copy()\n    days = expires_days if expires_days\
      \ is not None else settings.REFRESH_TOKEN_EXPIRE_DAYS\n    expire = datetime.now(timezone.utc)\
      \ + timedelta(days=days)\n    to_encode.update({\n        \"exp\": expire,\n\
      \        \"type\": \"refresh\",\n        \"jti\": str(uuid.uuid4()),\n    })\n\
      \    return jwt.encode(to_encode, settings.SECRET_KEY, algorithm=ALGORITHM)\n\
      \n\ndef verify_refresh_token(token: str) -> Optional[dict]:\n    \"\"\"Verify\
      \ a refresh token and return its payload, or None on failure.\"\"\"\n    try:\n\
      \        payload = jwt.decode(token, settings.SECRET_KEY, algorithms=[ALGORITHM])\n\
      \        if payload.get(\"type\") != \"refresh\":\n            logger.warning(\"\
      Token is not a refresh token\")\n            return None\n        return payload\n\
      \    except jwt.PyJWTError as e:\n        logger.warning(f\"Refresh token verification\
      \ failed: {e}\")\n        return None\n\n\n# ---------- get_current_user dependency\
      \ ----------\ndef _credentials_exception() -> HTTPException:\n    return HTTPException(\n\
      \        status_code=status.HTTP_401_UNAUTHORIZED,\n        detail=\"Could not\
      \ validate credentials\",\n        headers={\"WWW-Authenticate\": \"Bearer\"\
      },\n    )\n\n\ndef _get_user_repo(db: Session = Depends(get_db)) -> UserRepository:\n\
      \    return UserRepository(db)\n\n\ndef get_current_user(\n    token: str =\
      \ Depends(oauth2_scheme),\n    user_repo: UserRepository = Depends(_get_user_repo),\n\
      ) -> User:\n    \"\"\"Decode JWT, extract sub (email), load user from DB.\n\n\
      \    Raises:\n        HTTPException 401: if token is invalid/expired or user\
      \ not found.\n    \"\"\"\n    try:\n        payload = jwt.decode(token, settings.SECRET_KEY,\
      \ algorithms=[ALGORITHM])\n    except jwt.PyJWTError:\n        logger.warning(\"\
      JWT decode failed\", exc_info=True)\n        raise _credentials_exception()\n\
      \n    subject = payload.get(\"sub\")\n    if not isinstance(subject, str) or\
      \ not subject.strip():\n        raise _credentials_exception()\n\n    user =\
      \ user_repo.get_by_email(subject.strip().lower())\n    if user is None:\n  \
      \      raise _credentials_exception()\n\n    return user\n\n\n# ---------- Composable\
      \ auth dependencies ----------\ndef require_admin(current_user: User = Depends(get_current_user))\
      \ -> User:\n    \"\"\"Restrict access to system admins only. Chain after get_current_user.\"\
      \"\"\n    if current_user.system_role != \"ADMIN\":\n        raise HTTPException(\n\
      \            status_code=status.HTTP_403_FORBIDDEN,\n            detail=\"Admin\
      \ role required\",\n        )\n    return current_user\n"
    hashing_module: "\"\"\"core/hashing.py — Password hashing with bcrypt.\"\"\"\n\
      import bcrypt\n\nfrom backend.core.config import settings\n\n\nclass Hasher:\n\
      \    \"\"\"Stateless password hashing utility using bcrypt.\n\n    Configuration:\n\
      \        settings.PASSWORD_HASH_ROUNDS controls bcrypt work factor.\n      \
      \  Use 12 in production, 4 in tests for speed.\n    \"\"\"\n\n    @staticmethod\n\
      \    def verify_password(plain_password: str, hashed_password: str) -> bool:\n\
      \        \"\"\"Verify a plain password against a bcrypt hash.\"\"\"\n      \
      \  return bcrypt.checkpw(\n            plain_password.encode(\"utf-8\"),\n \
      \           hashed_password.encode(\"utf-8\"),\n        )\n\n    @staticmethod\n\
      \    def get_password_hash(password: str) -> str:\n        \"\"\"Hash a password\
      \ with bcrypt using configured rounds.\"\"\"\n        salt = bcrypt.gensalt(rounds=settings.PASSWORD_HASH_ROUNDS)\n\
      \        hashed = bcrypt.hashpw(password.encode(\"utf-8\"), salt)\n        return\
      \ hashed.decode(\"utf-8\")\n"
    user_model: "\"\"\"auth/models.py — User model and RevokedRefreshToken.\"\"\"\n\
      from __future__ import annotations\n\nimport datetime as dt\nimport enum\nimport\
      \ uuid\n\nfrom sqlalchemy import Boolean, DateTime, String\nfrom sqlalchemy\
      \ import Enum as SAEnum\nfrom sqlalchemy.orm import Mapped, mapped_column\n\n\
      from backend.database import Base, TimestampMixin, GUID, uuid_pk\n\n\nclass\
      \ SystemRole(str, enum.Enum):\n    ADMIN = \"ADMIN\"\n    STANDARD = \"STANDARD\"\
      \n\n\nclass User(TimestampMixin, Base):\n    __tablename__ = \"users\"\n\n \
      \   id: Mapped[uuid.UUID] = uuid_pk()\n    email: Mapped[str] = mapped_column(\n\
      \        String, unique=True, index=True, nullable=False\n    )\n    hashed_password:\
      \ Mapped[str] = mapped_column(String, nullable=False)\n    name: Mapped[str]\
      \ = mapped_column(String, nullable=True)\n    is_active: Mapped[bool] = mapped_column(Boolean,\
      \ default=True)\n    system_role: Mapped[SystemRole] = mapped_column(\n    \
      \    SAEnum(SystemRole, name=\"system_role\"),\n        nullable=False,\n  \
      \      default=SystemRole.STANDARD,\n        server_default=SystemRole.STANDARD.value,\n\
      \    )\n\n\nclass RevokedRefreshToken(Base):\n    \"\"\"Stores JTIs of rotated\
      \ refresh tokens to prevent reuse.\"\"\"\n    __tablename__ = \"revoked_refresh_tokens\"\
      \n\n    jti: Mapped[str] = mapped_column(String(36), primary_key=True)\n   \
      \ revoked_at: Mapped[dt.datetime] = mapped_column(\n        DateTime(timezone=True),\n\
      \        default=lambda: dt.datetime.now(dt.timezone.utc),\n        nullable=False,\n\
      \    )\n"
    user_repository: "\"\"\"auth/repository.py — UserRepository extending BaseRepository[User].\"\
      \"\"\nfrom typing import Optional\n\nfrom sqlalchemy import exists, select\n\
      \nfrom backend.auth.models import User\nfrom backend.core.repository import\
      \ BaseRepository\n\n\nclass UserRepository(BaseRepository[User]):\n    model\
      \ = User\n\n    def get_by_email(self, email: str) -> Optional[User]:\n    \
      \    \"\"\"Fetch user by email. Normalizes to lowercase + trim.\"\"\"\n    \
      \    normalized = email.strip().lower()\n        stmt = select(User).where(User.email\
      \ == normalized)\n        return self.db.scalar(stmt)\n\n    def exists_by_email(self,\
      \ email: str) -> bool:\n        \"\"\"Check if email is registered. Uses SQL\
      \ EXISTS (no row fetch).\"\"\"\n        normalized = email.strip().lower()\n\
      \        stmt = select(exists().where(User.email == normalized))\n        return\
      \ self.db.scalar(stmt) or False\n"
    user_schemas: "\"\"\"auth/schemas.py — Auth-related Pydantic schemas.\"\"\"\n\
      import uuid\nfrom typing import Optional\n\nfrom pydantic import BaseModel,\
      \ ConfigDict, EmailStr, Field, field_validator\n\n\ndef validate_password_strength(password:\
      \ str) -> str:\n    \"\"\"Enforce minimum password complexity.\"\"\"\n    if\
      \ len(password) < 12:\n        raise ValueError(\"Password must be at least\
      \ 12 characters\")\n    if not any(c.isupper() for c in password):\n       \
      \ raise ValueError(\"Password must contain at least one uppercase letter\")\n\
      \    if not any(c.isdigit() for c in password):\n        raise ValueError(\"\
      Password must contain at least one digit\")\n    if not any(c in r\"!@#$%^&*()-_=+[]{}|;:',.<>?/\"\
      \ for c in password):\n        raise ValueError(\"Password must contain a special\
      \ character\")\n    return password\n\n\nclass UserCreate(BaseModel):\n    email:\
      \ EmailStr\n    password: str = Field(..., min_length=12)\n    name: Optional[str]\
      \ = None\n\n    @field_validator(\"password\")\n    @classmethod\n    def check_password_strength(cls,\
      \ v: str) -> str:\n        return validate_password_strength(v)\n\n\nclass UserRead(BaseModel):\n\
      \    id: uuid.UUID\n    email: str\n    name: Optional[str]\n    is_active:\
      \ bool\n    system_role: str\n\n    model_config = ConfigDict(from_attributes=True)\n\
      \n\nclass LoginResponse(BaseModel):\n    access_token: str\n    token_type:\
      \ str = \"bearer\"\n    user_id: str\n    username: str\n\n\nclass TokenData(BaseModel):\n\
      \    \"\"\"Decoded JWT payload for type-safe access in dependencies.\"\"\"\n\
      \    sub: str\n    system_role: Optional[str] = None\n    exp: Optional[int]\
      \ = None\n"
    user_service: "\"\"\"auth/services.py — UserService with authenticate and create.\"\
      \"\"\nimport uuid\n\nfrom backend.auth.models import User\nfrom backend.auth.repository\
      \ import UserRepository\nfrom backend.auth.schemas import UserCreate\nfrom backend.core.exceptions\
      \ import AuthenticationError, ConflictError, EntityNotFound\nfrom backend.core.hashing\
      \ import Hasher\n\n\nclass UserService:\n    \"\"\"Service layer for user operations.\n\
      \n    Handles authentication, user creation, and password management.\n    All\
      \ DB access goes through UserRepository.\n    \"\"\"\n\n    def __init__(self,\
      \ repo: UserRepository) -> None:\n        self.repo = repo\n\n    def authenticate_user(self,\
      \ email: str, password: str) -> User:\n        \"\"\"Verify email + password.\
      \ Returns User or raises.\n\n        Raises:\n            EntityNotFound: if\
      \ email not registered.\n            AuthenticationError: if password is wrong.\n\
      \        \"\"\"\n        user = self.repo.get_by_email(email)\n        if not\
      \ user:\n            raise EntityNotFound(\n                f\"User with email\
      \ {email} not found\",\n                context={\"email\": email},\n      \
      \      )\n        if not Hasher.verify_password(password, user.hashed_password):\n\
      \            raise AuthenticationError(\"Incorrect password\")\n        return\
      \ user\n\n    def create_user(self, user_create: UserCreate) -> User:\n    \
      \    \"\"\"Create a new user. Raises ConflictError if email taken.\"\"\"\n \
      \       if self.repo.exists_by_email(user_create.email):\n            raise\
      \ ConflictError(\n                f\"User with email {user_create.email} already\
      \ exists\",\n                context={\"email\": user_create.email},\n     \
      \       )\n\n        data = user_create.model_dump(exclude_unset=True)\n   \
      \     plain_password = data.pop(\"password\")\n        data[\"hashed_password\"\
      ] = Hasher.get_password_hash(plain_password)\n        data.setdefault(\"name\"\
      , data[\"email\"].split(\"@\")[0])\n\n        user = User(**data)\n        self.repo.add(user)\n\
      \        self.repo.commit()\n        self.repo.refresh(user)\n        return\
      \ user\n\n    def get_user_by_id(self, user_id: uuid.UUID) -> User | None:\n\
      \        return self.repo.get(user_id)\n"
    auth_router: "\"\"\"auth/router.py — Login, signup, refresh, and /users/me endpoints.\"\
      \"\"\nfrom __future__ import annotations\n\nfrom fastapi import APIRouter, Cookie,\
      \ Depends, HTTPException, Response, status\nfrom fastapi.responses import JSONResponse\n\
      from fastapi.security import OAuth2PasswordRequestForm\n\nfrom backend.auth.models\
      \ import RevokedRefreshToken, User\nfrom backend.auth.oauth2 import (\n    create_access_token,\n\
      \    create_refresh_token,\n    get_current_user,\n    verify_refresh_token,\n\
      )\nfrom backend.auth.repository import UserRepository\nfrom backend.auth.schemas\
      \ import LoginResponse, UserCreate, UserRead\nfrom backend.auth.services import\
      \ UserService\nfrom backend.core.config import settings\nfrom backend.database\
      \ import get_db\n\nrouter = APIRouter()\n\n\ndef _get_user_service(db=Depends(get_db))\
      \ -> UserService:\n    return UserService(UserRepository(db))\n\n\n@router.post(\"\
      /login\")\ndef login(\n    form_data: OAuth2PasswordRequestForm = Depends(),\n\
      \    user_service: UserService = Depends(_get_user_service),\n):\n    \"\"\"\
      Authenticate and return JWT access token + refresh cookie.\n\n    Uses OAuth2PasswordRequestForm\
      \ (username field = email).\n    Sets refresh_token as httpOnly cookie. Returns\
      \ access_token in JSON body.\n    \"\"\"\n    user = user_service.authenticate_user(\n\
      \        email=form_data.username,\n        password=form_data.password,\n \
      \   )\n\n    access_token = create_access_token(\n        data={\"sub\": user.email,\
      \ \"system_role\": user.system_role.value}\n    )\n    refresh_token = create_refresh_token(data={\"\
      sub\": user.email})\n\n    response = JSONResponse(content={\n        \"access_token\"\
      : access_token,\n        \"token_type\": \"bearer\",\n        \"user_id\": str(user.id),\n\
      \        \"username\": user.email,\n    })\n\n    response.set_cookie(\n   \
      \     key=\"refresh_token\",\n        value=refresh_token,\n        httponly=True,\n\
      \        secure=settings.ENVIRONMENT != \"dev\",\n        samesite=\"lax\",\n\
      \        max_age=settings.REFRESH_TOKEN_EXPIRE_DAYS * 24 * 60 * 60,\n    )\n\
      \    return response\n\n\n@router.post(\"/signup\", response_model=UserRead,\
      \ status_code=status.HTTP_201_CREATED)\ndef signup(\n    payload: UserCreate,\n\
      \    user_service: UserService = Depends(_get_user_service),\n):\n    \"\"\"\
      Public signup endpoint. Creates user and returns UserRead.\"\"\"\n    return\
      \ user_service.create_user(payload)\n\n\n@router.post(\"/auth/refresh\")\ndef\
      \ refresh(\n    refresh_token: str = Cookie(None, alias=\"refresh_token\"),\n\
      \    db=Depends(get_db),\n):\n    \"\"\"Rotate refresh token and issue new access\
      \ token.\n\n    Flow:\n    1. Read refresh_token from httpOnly cookie\n    2.\
      \ Verify token signature and expiry\n    3. Check JTI not revoked (prevents\
      \ reuse of old tokens)\n    4. Revoke old JTI, issue new token pair\n    5.\
      \ Return access_token in JSON, set new refresh cookie\n    \"\"\"\n    if not\
      \ refresh_token:\n        raise HTTPException(\n            status_code=status.HTTP_401_UNAUTHORIZED,\n\
      \            detail=\"No refresh token provided\",\n        )\n\n    payload\
      \ = verify_refresh_token(refresh_token)\n    if not payload:\n        raise\
      \ HTTPException(\n            status_code=status.HTTP_401_UNAUTHORIZED,\n  \
      \          detail=\"Invalid or expired refresh token\",\n        )\n\n    #\
      \ Check revocation\n    jti = payload.get(\"jti\")\n    if jti:\n        revoked\
      \ = db.get(RevokedRefreshToken, jti)\n        if revoked:\n            raise\
      \ HTTPException(\n                status_code=status.HTTP_401_UNAUTHORIZED,\n\
      \                detail=\"Refresh token has been revoked\",\n            )\n\
      \n    email = payload.get(\"sub\")\n    if not email:\n        raise HTTPException(\n\
      \            status_code=status.HTTP_401_UNAUTHORIZED,\n            detail=\"\
      Invalid token payload\",\n        )\n\n    user_repo = UserRepository(db)\n\
      \    user = user_repo.get_by_email(email)\n    if not user:\n        raise HTTPException(\n\
      \            status_code=status.HTTP_401_UNAUTHORIZED,\n            detail=\"\
      User not found\",\n        )\n\n    # Revoke old token\n    if jti:\n      \
      \  db.add(RevokedRefreshToken(jti=jti))\n        db.commit()\n\n    # Issue\
      \ new tokens\n    new_access = create_access_token(\n        data={\"sub\":\
      \ user.email, \"system_role\": user.system_role.value}\n    )\n    new_refresh\
      \ = create_refresh_token(data={\"sub\": user.email})\n\n    response = JSONResponse(content={\n\
      \        \"access_token\": new_access,\n        \"token_type\": \"bearer\",\n\
      \    })\n    response.set_cookie(\n        key=\"refresh_token\",\n        value=new_refresh,\n\
      \        httponly=True,\n        secure=settings.ENVIRONMENT != \"dev\",\n \
      \       samesite=\"lax\",\n        max_age=settings.REFRESH_TOKEN_EXPIRE_DAYS\
      \ * 24 * 60 * 60,\n    )\n    return response\n\n\n@router.get(\"/users/me\"\
      , response_model=UserRead)\ndef get_me(current_user: User = Depends(get_current_user)):\n\
      \    \"\"\"Return the authenticated user's profile.\"\"\"\n    return current_user\n"
    cors_and_settings: "\"\"\"core/config.py additions — Auth and CORS settings.\"\
      \"\"\nfrom pydantic_settings import BaseSettings\n\n\nclass Settings(BaseSettings):\n\
      \    # ... existing settings ...\n\n    # Auth\n    SECRET_KEY: str = \"CHANGE-ME-IN-PRODUCTION\"\
      \n    ACCESS_TOKEN_EXPIRE_MINUTES: int = 30\n    REFRESH_TOKEN_EXPIRE_DAYS:\
      \ int = 7\n    PASSWORD_HASH_ROUNDS: int = 12\n\n    # CORS — React dev servers\
      \ + production domain\n    CORS_ORIGINS: list[str] = [\n        \"http://localhost:3000\"\
      ,   # Create React App / Next.js\n        \"http://localhost:5173\",   # Vite\n\
      \    ]\n\n    # Environment flag (controls secure cookie flag)\n    ENVIRONMENT:\
      \ str = \"dev\"\n\n# ---\n# main.py CORS setup:\n#\n# from fastapi.middleware.cors\
      \ import CORSMiddleware\n#\n# app.add_middleware(\n#     CORSMiddleware,\n#\
      \     allow_origins=settings.CORS_ORIGINS,\n#     allow_credentials=True,  #\
      \ REQUIRED for httpOnly cookie refresh flow\n#     allow_methods=[\"*\"],\n\
      #     allow_headers=[\"*\"],\n# )\n"
    app_wiring: "\"\"\"main.py — Wiring auth router and CORS middleware.\"\"\"\nfrom\
      \ fastapi import FastAPI\nfrom fastapi.middleware.cors import CORSMiddleware\n\
      \nfrom backend.auth.router import router as auth_router\nfrom backend.core.config\
      \ import settings\n\napp = FastAPI()\n\n# CORS — must be added BEFORE routes\n\
      app.add_middleware(\n    CORSMiddleware,\n    allow_origins=settings.CORS_ORIGINS,\n\
      \    allow_credentials=True,   # Required for httpOnly cookie refresh\n    allow_methods=[\"\
      *\"],\n    allow_headers=[\"*\"],\n)\n\n# Auth routes (no prefix — login at\
      \ /login, refresh at /auth/refresh)\napp.include_router(auth_router)\n"
  gotchas:
  - tokenUrl in OAuth2PasswordBearer MUST match the actual login route path — if login
    is under /api/v1/login, set tokenUrl='/api/v1/login' not '/login'
  - OAuth2PasswordRequestForm uses 'username' field for email — this is the OAuth2
    spec, do not rename it
  - allow_credentials=True in CORS is REQUIRED for httpOnly cookie refresh flow —
    without it the browser will not send the refresh_token cookie
  - When allow_credentials=True, allow_origins cannot be ['*'] — must list specific
    origins
  - Refresh token cookie must be httponly=True, secure=True in production, samesite='lax'
    — never expose refresh tokens to JavaScript
  - PyJWT exception class is jwt.PyJWTError (not JWTError) — different from python-jose
    which used jose.JWTError
  - PyJWT uses jwt.encode/jwt.decode — python-jose used jose.jwt.encode/jose.jwt.decode.
    Import is just 'import jwt' with PyJWT
  - PASSWORD_HASH_ROUNDS should be 4 in test settings for fast test execution — 12
    is production default
  - Never log token contents in error handlers — log the failure event only
  - UserService.authenticate_user should raise domain exceptions (EntityNotFound,
    AuthenticationError), not HTTP exceptions — the router maps these to HTTP status
    codes
  - The refresh endpoint must check JTI revocation BEFORE issuing new tokens — prevents
    stolen token reuse after legitimate rotation
  - RevokedRefreshToken table grows over time — schedule periodic cleanup of tokens
    older than REFRESH_TOKEN_EXPIRE_DAYS
  - Reference code uses `backend.` package prefix — adapt if your project package
    has a different name
  - Use GUID() from pat-fastapi-base-model for UUID columns, not sqlalchemy.dialects.postgresql.UUID
    — ensures SQLite compatibility
dependencies:
- PyJWT
- bcrypt
- python-multipart
tests:
- test_login_returns_access_token_and_sets_refresh_cookie
