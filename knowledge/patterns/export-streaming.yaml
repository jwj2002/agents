schema_version: 1
id: pat-export-streaming
legacy_id: PAT-005
category: export
name: Streaming export
status: validated
tier: primary
description: Memory-efficient data export using StreamingResponse with pluggable formatters
  for CSV and JSON output
when_to_use: Large dataset exports, CSV/JSON download endpoints, reports that exceed
  reasonable memory limits
when_not_to_use: Small datasets that fit in memory, exports requiring complex post-processing
  before sending, binary file formats
implementation:
  language: python
  framework: FastAPI
  key_files:
  - export/streaming.py — StreamingResponse wrapper with chunked iteration
  - export/formatters.py — CSV and JSON formatter implementations
  - export/export_service.py — query execution with cursor-based iteration
  key_decisions:
  - 'Chunk size: 1000 rows per iteration to balance memory and throughput'
  - Content-Disposition header set for browser download
  - CSV formatter uses csv.writer with StringIO buffer per chunk
  - JSON formatter uses streaming array format with newline-delimited chunks
dependencies:
- fastapi
tests:
- test_csv_export — verify CSV output with correct headers and row format
- test_json_export — verify JSON array output is valid
- test_large_export — verify memory stays bounded for 100k+ row export
- test_empty_export — verify graceful handling of zero-row result
- test_content_disposition — verify download filename in response headers
