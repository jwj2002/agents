name: Validate config
# No paths filter (#362): lint + tests must run on EVERY PR — the old filter
# meant code changes under lib/, bin/, action/, tests/, etc. shipped with
# zero CI. The job is fast (<2 min); filtering is not worth the blind spot.
on:
  pull_request:
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          pip install pyyaml pytest ruff
          npm install -g @openai/codex

      - name: Lint (ruff — includes LR-001 blind-except enforcement)
        run: ruff check .

      - name: Tests
        # Three invocations: claude-config/tests + lib/tests share a conftest
        # package; root tests/ and the tool-CLI suites are separate roots
        # (collecting all at once trips a tests.conftest name collision).
        run: |
          python3 -m pytest claude-config/tests lib/tests -q
          python3 -m pytest tests -q
          python3 -m pytest action/tests decision/tests project/tests pulse/tests email-digest/tests -q

      - name: Validate settings.json is valid JSON
        run: python3 -c "import json; json.load(open('claude-config/settings.json'))"

      - name: Validate shell script syntax
        run: |
          bash -n install-all.sh
          bash -n claude-config/install.sh
          bash -n codex-config/install.sh
          bash -n new-project-agents.sh
          bash -n claude-config/new-project-claude.sh

      - name: Validate hook script paths in settings.json
        env:
          SETTINGS_PATH: ${{ github.workspace }}/claude-config/settings.json
        run: python3 claude-config/scripts/validate-hooks.py

      - name: Generated post-merge hook must be non-interactive
        run: |
          # The post-merge hook re-syncs config on `git pull` and runs
          # non-interactively, so it MUST call install-all.sh with --skip-profile
          # (otherwise install-all.sh prompts for a profile and hangs the pull).
          # Guard: every line that *executes* install-all.sh must carry
          # --skip-profile. We select execution lines as those mentioning
          # `install-all.sh"` and exclude the `[ -x ... ]` existence test, so the
          # check catches a future bare invocation even if it drops the `2>&1`
          # redirect (does not rely on the sed pipe being present).
          inv="$(grep -nE 'install-all\.sh"' claude-config/install.sh | grep -vE '\[[[:space:]]*-x' || true)"
          echo "$inv"
          if [ -z "$inv" ]; then
            echo "::error::no install-all.sh invocation found in generated post-merge hook"
            exit 1
          fi
          if echo "$inv" | grep -v -- '--skip-profile' | grep -q .; then
            echo "::error::post-merge hook invokes install-all.sh without --skip-profile"
            exit 1
          fi
          echo "OK: post-merge hook is non-interactive (--skip-profile present)"

      - name: Enforce context budgets (CLAUDE.md ≤200, always-load rules ≤450)
        run: python3 claude-config/scripts/check-context-budgets.py

      - name: Payload report (hook-injected context — report only, never fails)
        continue-on-error: true
        run: python3 claude-config/scripts/check-context-budgets.py --payload-report

      - name: Validate Codex command-policy rules
        run: |
          set -e
          for f in codex-config/rules/*.rules; do
            codex execpolicy check --pretty --rules "$f" -- git status
          done

      - name: Validate shared skill portability
        run: |
          # Exit-code contract of check-skill-portability.sh (matches the
          # installer's skip-and-continue behavior):
          #   0 = portable      → symlinked into Codex
          #   1 = Claude-only   → skipped for Codex (NOTICE, not a failure)
          #   2 = invalid/usage → real lint error (FAIL the job)
          # CI must NOT red-X on exit 1 — a legitimate Claude-only skill is the
          # documented contract (docs/SKILL-SURFACES.md), not a defect.
          fail=0
          for f in codex-config/skills/*/SKILL.md claude-config/skills/*/SKILL.md; do
            [ -f "$f" ] || continue
            name="$(basename "$(dirname "$f")")"
            out="$(claude-config/scripts/check-skill-portability.sh "$f")" && rc=0 || rc=$?
            case "$rc" in
              0) echo "::notice::portable: $name" ;;
              1) echo "::notice::claude-only (skipped for Codex): $name"
                 [ -n "$out" ] && echo "$out" ;;
              2) echo "::error::invalid skill (lint/usage error): $name"
                 echo "$out"; fail=1 ;;
              *) echo "::error::unexpected exit $rc from portability check: $name"
                 echo "$out"; fail=1 ;;
            esac
          done
          [ "$fail" = "0" ] || exit 1

      - name: Validate Claude/Codex parity report
        run: bin/agent-parity check

      - name: Smoke test Codex install in temp HOME
        run: |
          set -e
          tmp="$(mktemp -d)"
          HOME="$tmp" ./codex-config/install.sh
          test -L "$tmp/.codex/AGENTS.md"
          test -L "$tmp/.codex/rules/shared.rules"

          assert_skill_link() {
            name="$1"
            expected="$2"
            for root in "$tmp/.codex/skills" "$tmp/.agents/skills"; do
              link="$root/$name"
              if [ ! -L "$link" ]; then
                echo "::error::missing skill symlink: $link"
                exit 1
              fi
              actual="$(readlink "$link")"
              if [ "$actual" != "$expected" ]; then
                echo "::error::wrong skill symlink target: $link -> $actual (expected $expected)"
                exit 1
              fi
            done
          }

          for skill_md in codex-config/skills/*/SKILL.md; do
            [ -f "$skill_md" ] || continue
            name="$(basename "$(dirname "$skill_md")")"
            assert_skill_link "$name" "$PWD/codex-config/skills/$name"
          done

          for skill_md in claude-config/skills/*/SKILL.md; do
            [ -f "$skill_md" ] || continue
            name="$(basename "$(dirname "$skill_md")")"
            if claude-config/scripts/check-skill-portability.sh "$skill_md" >/dev/null; then
              assert_skill_link "$name" "$PWD/claude-config/skills/$name"
            else
              rc=$?
              if [ "$rc" = "2" ]; then
                echo "::error::invalid skill portability check for $name"
                exit 1
              fi
            fi
          done

          bin/agent-parity check --home "$tmp"

      - name: Smoke test project bootstrap idempotency
        run: |
          set -e
          tmp="$(mktemp -d)"
          ./new-project-agents.sh "$tmp"
          ./new-project-agents.sh "$tmp"
          test -f "$tmp/AGENTS.md"
          test -f "$tmp/CLAUDE.md"
          test -f "$tmp/.claude/settings.json"
          test -f "$tmp/.agents/skills/.gitkeep"

          tmp_codex="$(mktemp -d)"
          ./new-project-agents.sh --with-codex-config "$tmp_codex"
          test -f "$tmp_codex/.codex/config.toml"

      - name: Verify pattern ID slug format
        run: |
          set -e
          fail=0
          for f in knowledge/patterns/*.yaml; do
            stem=$(basename "$f" .yaml)
            id=$(grep "^id:" "$f" | head -1 | awk '{print $2}')
            if [ "$id" != "pat-$stem" ]; then
              echo "MISMATCH: $f has id=$id (expected pat-$stem)"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            exit 1
          fi
          echo "All $(ls knowledge/patterns/*.yaml | wc -l | tr -d ' ') patterns have correct slug IDs"
